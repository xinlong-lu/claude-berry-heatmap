<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wild Berry Map — USA</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet Heatmap plugin -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── RESET & VARIABLES ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1a0f;
      --surface:   #132016;
      --border:    #1e3322;
      --accent:    #6fcf4a;
      --accent2:   #c8f57a;
      --text:      #e8f5e0;
      --muted:     #7a9e72;
      --berry-1:   #4a90d9;   /* Blueberry */
      --berry-2:   #1a1a2e;   /* Blackberry */
      --berry-3:   #e05c5c;   /* Raspberry */
      --berry-4:   #f4a261;   /* Strawberry */
      --berry-5:   #8b5cf6;   /* Elderberry */
      --berry-6:   #2d6a4f;   /* Huckleberry */
      --berry-7:   #e9c46a;   /* Serviceberry */
      --berry-8:   #f77f00;   /* Gooseberry */
    }

    html, body { height: 100%; font-family: 'Lato', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── LAYOUT ────────────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; width: 100vw; }

    /* ── SIDEBAR ───────────────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, #1a2e1c 0%, var(--surface) 100%);
    }

    #sidebar-header .eyebrow {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    #sidebar-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      line-height: 1.1;
      color: var(--text);
    }

    #sidebar-header h1 span { color: var(--accent); }

    #sidebar-header p {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── CONTROLS ──────────────────────────────────────────────────── */
    #controls { padding: 20px 24px; border-bottom: 1px solid var(--border); }

    #controls h2 {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* View toggle */
    #view-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 16px;
      gap: 3px;
    }

    .view-btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 6px;
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }

    .view-btn.active {
      background: var(--accent);
      color: var(--bg);
    }

    /* Berry filter pills */
    #berry-filters { display: flex; flex-wrap: wrap; gap: 6px; }

    .berry-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px 5px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
    }

    .berry-pill.active {
      border-color: var(--pill-color, var(--accent));
      color: var(--text);
      background: color-mix(in srgb, var(--pill-color, var(--accent)) 15%, var(--bg));
    }

    .berry-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pill-color, var(--accent));
      flex-shrink: 0;
    }

    /* Season filter */
    #season-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    #season-section h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    .season-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .season-btn {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--muted);
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .season-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, var(--bg));
    }

    /* ── BERRY GUIDE ───────────────────────────────────────────────── */
    #guide-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #guide-section h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

    .guide-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      background: var(--bg);
      cursor: pointer;
      transition: all 0.2s;
    }

    .guide-card:hover { border-color: var(--card-color, var(--accent)); transform: translateX(3px); }

    .guide-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

    .guide-card-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--card-color, var(--accent)) 20%, var(--bg));
      border: 1px solid var(--card-color, var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .guide-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .guide-card-season {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--card-color, var(--accent));
      margin-bottom: 5px;
    }

    .guide-card-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── MAP ───────────────────────────────────────────────────────── */
    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* Stats bar */
    #stats-bar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 20px;
      display: flex;
      gap: 24px;
      z-index: 500;
      backdrop-filter: blur(10px);
    }

    .stat { text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      color: var(--text) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }

    .leaflet-popup-tip { background: var(--surface) !important; }

    .popup-inner { padding: 4px; min-width: 180px; }
    .popup-berry { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .popup-place { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
    .popup-date { font-size: 11px; color: var(--accent); letter-spacing: 1px; }
    .popup-link { display: inline-block; margin-top: 8px; font-size: 11px; color: var(--accent); text-decoration: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; transition: all 0.2s; }
    .popup-link:hover { background: var(--accent); color: var(--bg); }

    /* Leaflet overrides */
    .leaflet-control-zoom { border: 1px solid var(--border) !important; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(13,26,15,0.8) !important; color: var(--muted) !important; }
    .leaflet-control-attribution a { color: var(--accent) !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="eyebrow">🫐 Forager's Atlas</div>
      <h1>Wild <span>Berry</span><br>Map USA</h1>
      <p>Explore verified sightings of wild berries across the United States. Data sourced from iNaturalist.</p>
    </div>

    <div id="controls">
      <h2>Map View</h2>
      <div id="view-toggle">
        <button class="view-btn active" data-view="markers" onclick="setView('markers')">📍 Markers</button>
        <button class="view-btn" data-view="heat" onclick="setView('heat')">🌡 Heatmap</button>
      </div>
      <h2>Filter by Berry</h2>
      <div id="berry-filters"></div>
    </div>

    <div id="season-section">
      <h2>Season</h2>
      <div class="season-grid">
        <button class="season-btn active" data-season="all" onclick="setSeason('all')">🌿 All</button>
        <button class="season-btn" data-season="spring" onclick="setSeason('spring')">🌸 Spring</button>
        <button class="season-btn" data-season="summer" onclick="setSeason('summer')">☀️ Summer</button>
        <button class="season-btn" data-season="fall" onclick="setSeason('fall')">🍂 Fall</button>
      </div>
    </div>

    <div id="guide-section">
      <h2>Berry Guide</h2>
      <div id="guide-cards"></div>
    </div>
  </div>

  <!-- ── MAP ── -->
  <div id="map-container">
    <div id="stats-bar">
      <div class="stat"><div class="stat-num" id="stat-count">0</div><div class="stat-label">Sightings</div></div>
      <div class="stat"><div class="stat-num" id="stat-species">0</div><div class="stat-label">Species</div></div>
      <div class="stat"><div class="stat-num" id="stat-states">0</div><div class="stat-label">States</div></div>
    </div>
    <div id="map"></div>
  </div>

</div>

<script>
// ── BERRY METADATA ─────────────────────────────────────────────────────────────
const BERRY_META = {
  "Blueberry":    { color: "#4a90d9", emoji: "🫐", season: "summer",        desc: "Found in acidic, sandy soils. Peak season July–August. Common in bogs and mountain meadows." },
  "Blackberry":   { color: "#9b59b6", emoji: "🍇", season: "summer",        desc: "Thrives in disturbed areas and forest edges. Peak June–August. Found across most of the US." },
  "Raspberry":    { color: "#e05c5c", emoji: "❤️", season: "summer",        desc: "Prefers cooler climates and moist soils. Peak July–August. Common in northern states." },
  "Strawberry":   { color: "#f4a261", emoji: "🍓", season: "spring",        desc: "Wild varieties smaller and more flavorful than cultivated. Peak May–June in most regions." },
  "Elderberry":   { color: "#8b5cf6", emoji: "🔮", season: "fall",          desc: "Large shrubs along streams and roadsides. Peak August–September. Must be cooked before eating." },
  "Huckleberry":  { color: "#2ecc71", emoji: "🌲", season: "summer",        desc: "Mountain species, often above 3,000ft. Peak July–September. Pacific Northwest specialty." },
  "Serviceberry": { color: "#e9c46a", emoji: "⭐", season: "spring",        desc: "One of the first berries of the year. Peak June–July. Found in forests and open woodlands." },
  "Gooseberry":   { color: "#f77f00", emoji: "🟠", season: "summer",        desc: "Thorny shrubs in forests and rocky slopes. Peak July–August. Tart flavor, great for jams." },
};

const SEASON_MONTHS = {
  spring: [3,4,5],
  summer: [6,7,8],
  fall:   [9,10,11],
};

// ── STATE ──────────────────────────────────────────────────────────────────────
let allData = [];
let activeFilters = new Set(Object.keys(BERRY_META));
let currentView = "markers";
let currentSeason = "all";
let markerLayer, heatLayer;

// ── MAP INIT ───────────────────────────────────────────────────────────────────
const map = L.map("map", {
  center: [39.5, -98.35],
  zoom: 4,
  zoomControl: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://carto.com">CARTO</a> | Data: <a href="https://www.inaturalist.org">iNaturalist</a>',
  maxZoom: 19,
}).addTo(map);

markerLayer = L.layerGroup().addTo(map);
heatLayer   = L.layerGroup();

// ── LOAD DATA ──────────────────────────────────────────────────────────────────
fetch("berries.json")
  .then(r => r.json())
  .then(data => {
    allData = data;
    buildFilters();
    buildGuide();
    renderMap();
  });

// ── BUILD SIDEBAR FILTERS ──────────────────────────────────────────────────────
function buildFilters() {
  const container = document.getElementById("berry-filters");
  for (const [name, meta] of Object.entries(BERRY_META)) {
    const pill = document.createElement("div");
    pill.className = "berry-pill active";
    pill.style.setProperty("--pill-color", meta.color);
    pill.innerHTML = `<span class="dot"></span>${name}`;
    pill.addEventListener("click", () => toggleFilter(name, pill));
    container.appendChild(pill);
  }
}

function toggleFilter(name, pill) {
  if (activeFilters.has(name)) {
    activeFilters.delete(name);
    pill.classList.remove("active");
  } else {
    activeFilters.add(name);
    pill.classList.add("active");
  }
  renderMap();
}

// ── BUILD GUIDE CARDS ──────────────────────────────────────────────────────────
function buildGuide() {
  const container = document.getElementById("guide-cards");
  for (const [name, meta] of Object.entries(BERRY_META)) {
    const card = document.createElement("div");
    card.className = "guide-card";
    card.style.setProperty("--card-color", meta.color);
    card.innerHTML = `
      <div class="guide-card-header">
        <div class="guide-card-icon">${meta.emoji}</div>
        <div class="guide-card-name">${name}</div>
      </div>
      <div class="guide-card-season">Peak: ${meta.season}</div>
      <div class="guide-card-desc">${meta.desc}</div>
    `;
    card.addEventListener("click", () => {
      activeFilters = new Set([name]);
      document.querySelectorAll(".berry-pill").forEach(p => {
        p.classList.toggle("active", p.textContent.trim() === name);
      });
      renderMap();
    });
    container.appendChild(card);
  }
}

// ── SEASON FILTER ──────────────────────────────────────────────────────────────
function setSeason(season) {
  currentSeason = season;
  document.querySelectorAll(".season-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.season === season);
  });
  renderMap();
}

function matchesSeason(dateStr) {
  if (currentSeason === "all") return true;
  const month = new Date(dateStr).getMonth() + 1;
  return SEASON_MONTHS[currentSeason]?.includes(month) ?? true;
}

// ── VIEW TOGGLE ────────────────────────────────────────────────────────────────
function setView(view) {
  currentView = view;
  document.querySelectorAll(".view-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.view === view);
  });
  renderMap();
}

// ── RENDER MAP ─────────────────────────────────────────────────────────────────
function renderMap() {
  markerLayer.clearLayers();
  map.removeLayer(heatLayer);

  const filtered = allData.filter(d =>
    activeFilters.has(d.name) && matchesSeason(d.date)
  );

  updateStats(filtered);

  if (currentView === "markers") {
    map.addLayer(markerLayer);
    filtered.forEach(d => addMarker(d));
  } else {
    const heat = filtered.map(d => [d.lat, d.lng, 1]);
    heatLayer = L.heatLayer(heat, {
      radius: 25, blur: 20, maxZoom: 10,
      gradient: { 0.2: "#2d6a4f", 0.5: "#6fcf4a", 0.8: "#c8f57a", 1.0: "#ffffff" }
    });
    map.addLayer(heatLayer);
  }
}

function addMarker(d) {
  const meta = BERRY_META[d.name] || { color: "#6fcf4a", emoji: "🫐" };

  const icon = L.divIcon({
    className: "",
    html: `<div style="
      width:28px; height:28px; border-radius:50%;
      background:${meta.color}33;
      border:2px solid ${meta.color};
      display:flex; align-items:center; justify-content:center;
      font-size:13px; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,0.4);
      transition:transform 0.15s;
    ">${meta.emoji}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
  });

  const popup = `
    <div class="popup-inner">
      <div class="popup-berry">${meta.emoji} ${d.name}</div>
      <div class="popup-place">📍 ${d.place}</div>
      <div class="popup-date">🗓 ${d.date}</div>
      <a class="popup-link" href="${d.url}" target="_blank">View on iNaturalist ↗</a>
    </div>`;

  L.marker([d.lat, d.lng], { icon })
    .bindPopup(popup)
    .addTo(markerLayer);
}

// ── STATS ──────────────────────────────────────────────────────────────────────
function updateStats(data) {
  document.getElementById("stat-count").textContent = data.length;
  document.getElementById("stat-species").textContent = new Set(data.map(d => d.name)).size;
  // rough state count from place names
  const states = new Set(data.map(d => d.place?.split(", ").pop()).filter(Boolean));
  document.getElementById("stat-states").textContent = states.size;
}
</script>
</body>
</html>
